<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" role="img" aria-labelledby="hero-title hero-description">

    <title id="hero-title">Santa Fe business and river landscape</title>

    <desc id="hero-description">
        A modern illustration of Santa Fe, Argentina, with a bridge,
        river, skyline, and business district.
    </desc>

    <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#8fd3f4"></stop>
            <stop offset="100%" stop-color="#dbeaf2"></stop>
        </linearGradient>

        <linearGradient id="river" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#397fa6"></stop>
            <stop offset="100%" stop-color="#65b7d1"></stop>
        </linearGradient>
    </defs>

    <rect width="1600" height="700" fill="url(#sky)"></rect>

    <circle cx="1320" cy="115" r="70" fill="#f5c453"></circle>

    <path d="M0 500 C300 430 570 520 850 460 C1120 400 1350 450 1600 390
        L1600 700 L0 700 Z" fill="url(#river)"></path>

    <path d="M0 520 C300 450 590 540 870 480 C1140 420 1370 470 1600 410" fill="none" stroke="#ffffff" stroke-width="9" opacity=".55"></path>

    <g fill="#123b5d">
        <rect x="110" y="290" width="120" height="210"></rect>
        <rect x="255" y="245" width="150" height="255"></rect>
        <rect x="430" y="330" width="105" height="170"></rect>
        <rect x="1110" y="270" width="150" height="230"></rect>
        <rect x="1290" y="315" width="115" height="185"></rect>
        <rect x="1430" y="235" width="105" height="265"></rect>
    </g>

    <g fill="#f5d276">
        <rect x="135" y="320" width="22" height="28"></rect>
        <rect x="180" y="320" width="22" height="28"></rect>
        <rect x="135" y="375" width="22" height="28"></rect>
        <rect x="180" y="375" width="22" height="28"></rect>

        <rect x="285" y="280" width="25" height="30"></rect>
        <rect x="345" y="280" width="25" height="30"></rect>
        <rect x="285" y="340" width="25" height="30"></rect>
        <rect x="345" y="340" width="25" height="30"></rect>

        <rect x="1140" y="305" width="26" height="30"></rect>
        <rect x="1200" y="305" width="26" height="30"></rect>
        <rect x="1140" y="365" width="26" height="30"></rect>
        <rect x="1200" y="365" width="26" height="30"></rect>
    </g>

    <path d="M470 475 Q800 180 1130 475" fill="none" stroke="#e5a900" stroke-width="24" stroke-linecap="round"></path>

    <path d="M470 475 H1130" stroke="#ffffff" stroke-width="18"></path>

    <path d="M560 475 V390 M680 475 V300 M800 475 V255
        M920 475 V300 M1040 475 V390" stroke="#ffffff" stroke-width="10"></path>

    <g fill="#39734f">
        <circle cx="70" cy="470" r="55"></circle>
        <circle cx="545" cy="485" r="45"></circle>
        <circle cx="1060" cy="485" r="46"></circle>
        <circle cx="1560" cy="455" r="70"></circle>
    </g>
</svg>